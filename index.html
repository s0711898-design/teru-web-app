<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>競泳レース分析ツール</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary: #475569;
            --bg-color: #f8fafc;
            --border: #e2e8f0;
            --draw: #f59e0b;
            --undo: #64748b;
        }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 24px;
        }
        .video-section, .controls-section {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .video-container {
            position: relative;
            width: 100%;
            margin-bottom: 10px;
            background: #000;
            border-radius: 4px;
            overflow: hidden;
            min-height: 300px; 
        }
        video {
            width: 100%;
            display: block;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            z-index: 10;
        }
        canvas.drawing-active {
            pointer-events: auto;
            cursor: crosshair;
        }
        h2 { font-size: 1.2rem; margin-top: 0; border-bottom: 2px solid var(--border); padding-bottom: 8px; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
        button {
            padding: 10px 16px;
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
            background-color: var(--primary);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: var(--primary-hover); }
        button.action-btn { background-color: #ef4444; }
        button.action-btn:hover { background-color: #dc2626; }
        button.tempo-btn { background-color: #10b981; }
        button.tempo-btn:hover { background-color: #059669; }
        button.draw-btn { background-color: var(--draw); }
        button.draw-btn:hover { background-color: #d97706; }
        button.draw-btn.active { background-color: #b45309; box-shadow: inset 0 3px 5px rgba(0,0,0,0.2); }
        button.undo-btn { background-color: var(--undo); font-size: 0.9rem; padding: 10px 12px; }
        button.undo-btn:hover { background-color: #475569; }
        button.export-btn { background-color: var(--secondary); width: 100%; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background-color: #f1f5f9; font-size: 0.9rem; }
        td { font-family: monospace; font-size: 1.1rem; }
        .unmeasured { color: #94a3b8; font-style: italic; font-size: 0.9rem; }
        .time-display { font-weight: bold; font-size: 1.1rem; color: var(--primary); margin-bottom: 16px; }
        .help-text { font-size: 0.85rem; color: #64748b; margin-top: -10px; margin-bottom: 16px; display: block; }
        .detected-distance { color: #10b981; font-weight: bold; margin-left: 10px; font-size: 1rem; }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 左側：映像・コントロールエリア -->
    <div class="video-section">
        <h2>1. 映像読み込み・再生 <span id="detected-distance" class="detected-distance"></span></h2>
        <input type="file" id="video-upload" accept="video/*" style="margin-bottom: 15px;">
        
        <div class="video-container" id="video-container">
            <video id="video-player" controls></video>
            <canvas id="draw-canvas"></canvas>
        </div>
        <span class="help-text">※キーボードの「←」「→」でコマ送り・コマ戻しができます。</span>

        <div class="time-display">
            動画の現在時間: <span id="current-time-display">0.00</span> 秒
        </div>

        <h2>2. キャリブレーション (直線描画)</h2>
        <div class="btn-group">
            <button class="draw-btn" id="btn-draw-toggle">描画モード：OFF</button>
            <button class="export-btn" id="btn-clear-lines" style="width: auto; margin-top: 0;">線をすべて消去</button>
        </div>
        <span class="help-text">描画モードONの時、画面をドラッグして直線を引けます（複数可）。</span>
        
        <h2>3. タイム計測 (到達時間)</h2>
        <div class="btn-group">
            <button class="action-btn" id="btn-start">Start (開始時間)</button>
            <button id="btn-split">Split (通過)</button>
            <button class="undo-btn" id="btn-undo-split">↩ 1つ取り消す</button>
        </div>
        
        <h2>4. ストロークテンポ計測</h2>
        <div class="btn-group">
            <button class="tempo-btn" id="btn-tempo-0">テンポ「0」</button>
            <button class="tempo-btn" id="btn-tempo-3">テンポ「3」</button>
            <button class="undo-btn" id="btn-undo-tempo">↩ 1つ取り消す</button>
        </div>
    </div>

    <!-- 右側：データ出力エリア -->
    <div class="controls-section">
        <h2>計測データ</h2>
        <div class="time-display">
            基準開始時間: <span id="base-start-time">未設定</span>
        </div>

        <h3>スプリットタイム</h3>
        <table id="split-table">
            <thead><tr><th>分析区間</th><th>タイム (秒)</th></tr></thead>
            <tbody></tbody>
        </table>

        <h3>ストロークテンポ</h3>
        <table id="tempo-table">
            <thead><tr><th>分析区間</th><th>テンポ (秒/回)</th></tr></thead>
            <tbody></tbody>
        </table>

        <button class="export-btn" id="btn-export">CSVダウンロード</button>
    </div>
</div>

<script>
    // --- 要素の取得 ---
    const video = document.getElementById('video-player');
    const currentTimeDisplay = document.getElementById('current-time-display');
    const baseStartTimeDisplay = document.getElementById('base-start-time');
    const detectedDistanceDisplay = document.getElementById('detected-distance');
    const splitTableBody = document.querySelector('#split-table tbody');
    const tempoTableBody = document.querySelector('#tempo-table tbody');

    // --- 各距離の目標区間定義 ---
    const distanceDefinitions = {
        '50m': {
            splits: ['15m', '25m', '35m', '45m'],
            tempos: ['Lap 1']
        },
        '100m': {
            splits: ['15m', '25m', '35m', '45m', '50m', '65m', '75m', '85m', '95m', '100m'],
            tempos: ['Lap 1', 'Lap 2']
        },
        '200m': {
            splits: ['15m', '25m', '45m', '50m', '65m', '75m', '95m', '100m', '115m', '125m', '145m', '150m', '165m', '175m', '195m', '200m'],
            tempos: ['Lap 1', 'Lap 2', 'Lap 3', 'Lap 4']
        },
        '400m': {
            splits: ['15m', '45m', '50m', '65m', '95m', '100m', '115m', '145m', '150m', '165m', '195m', '200m', '215m', '245m', '250m', '265m', '295m', '300m', '315m', '345m', '350m', '365m', '395m', '400m'],
            tempos: ['Lap 1', 'Lap 2', 'Lap 3', 'Lap 4', 'Lap 5', 'Lap 6', 'Lap 7', 'Lap 8']
        }
    };

    // --- 計測用変数 ---
    let startTime = null;
    let tempoZeroTime = null;
    let recordedSplits = [];
    let recordedTempos = [];
    let targetSplits = [];
    let targetTempos = [];

    // 初期状態のテーブル描画
    updateSplitTable();
    updateTempoTable();

    // --- 動画読み込みとファイル名解析 ---
    document.getElementById('video-upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            video.src = URL.createObjectURL(file);
            
            // ファイル名から距離を判定
            const fileName = file.name.toLowerCase();
            let detected = null;
            
            if (fileName.includes('400m')) detected = '400m';
            else if (fileName.includes('200m')) detected = '200m';
            else if (fileName.includes('100m')) detected = '100m';
            else if (fileName.includes('50m')) detected = '50m';

            // 判別結果を適用
            if (detected) {
                detectedDistanceDisplay.textContent = `(${detected}の分析区間を適用中)`;
                targetSplits = distanceDefinitions[detected].splits;
                targetTempos = distanceDefinitions[detected].tempos;
            } else {
                detectedDistanceDisplay.textContent = '(距離を自動判別できませんでした)';
                targetSplits = [];
                targetTempos = [];
            }
            
            // データのリセットとテーブルの再描画
            startTime = null;
            tempoZeroTime = null;
            recordedSplits = [];
            recordedTempos = [];
            baseStartTimeDisplay.textContent = '未設定';
            updateSplitTable();
            updateTempoTable();
        }
    });

    video.addEventListener('timeupdate', () => {
        currentTimeDisplay.textContent = video.currentTime.toFixed(2);
    });

    // --- コマ送り機能 ---
    document.addEventListener('keydown', function(event) {
        if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
        const frameTime = 1 / 30; // 30fps想定
        if (event.key === 'ArrowRight') {
            video.currentTime += frameTime;
            event.preventDefault();
        } else if (event.key === 'ArrowLeft') {
            video.currentTime -= frameTime;
            event.preventDefault();
        }
    });

    // --- 計測ロジック ---
    document.getElementById('btn-start').addEventListener('click', () => {
        startTime = video.currentTime;
        baseStartTimeDisplay.textContent = startTime.toFixed(2) + ' 秒';
        recordedSplits = []; 
        updateSplitTable();
    });

    // スプリット計測
    document.getElementById('btn-split').addEventListener('click', () => {
        if (startTime === null) { alert('先にStartを押して開始時間を設定してください。'); return; }
        recordedSplits.push((video.currentTime - startTime).toFixed(2));
        updateSplitTable();
    });

    // スプリット取り消し (Undo)
    document.getElementById('btn-undo-split').addEventListener('click', () => {
        if (recordedSplits.length > 0) {
            recordedSplits.pop();
            updateSplitTable();
        }
    });

    // テンポ「0」
    document.getElementById('btn-tempo-0').addEventListener('click', () => {
        tempoZeroTime = video.currentTime;
    });

    // テンポ「3」
    document.getElementById('btn-tempo-3').addEventListener('click', () => {
        if (tempoZeroTime === null) { alert('先にテンポ「0」を押してください。'); return; }
        recordedTempos.push(((video.currentTime - tempoZeroTime) / 3).toFixed(2));
        updateTempoTable();
        tempoZeroTime = null;
    });

    // テンポ取り消し (Undo)
    document.getElementById('btn-undo-tempo').addEventListener('click', () => {
        if (recordedTempos.length > 0) {
            recordedTempos.pop();
            updateTempoTable();
            tempoZeroTime = null; // リカバリーのために0の記録も一旦クリア
        }
    });

    // --- テーブル描画ロジック ---
    function updateSplitTable() {
        splitTableBody.innerHTML = '';
        // 目標区間の数、または実際に計測した数のうち、多い方に合わせて行を生成
        const rowCount = Math.max(targetSplits.length, recordedSplits.length);
        
        if (rowCount === 0) {
            splitTableBody.innerHTML = '<tr><td colspan="2" class="unmeasured">動画を読み込むか、計測を開始してください</td></tr>';
            return;
        }

        for (let i = 0; i < rowCount; i++) {
            const label = targetSplits[i] || `追加区間 ${i + 1}`;
            const time = recordedSplits[i] !== undefined ? recordedSplits[i] : '<span class="unmeasured">未計測</span>';
            splitTableBody.innerHTML += `<tr><td>${label}</td><td>${time}</td></tr>`;
        }
    }

    function updateTempoTable() {
        tempoTableBody.innerHTML = '';
        const rowCount = Math.max(targetTempos.length, recordedTempos.length);
        
        if (rowCount === 0) {
            tempoTableBody.innerHTML = '<tr><td colspan="2" class="unmeasured">動画を読み込むか、計測を開始してください</td></tr>';
            return;
        }

        for (let i = 0; i < rowCount; i++) {
            const label = targetTempos[i] || `追加計測 ${i + 1}`;
            const time = recordedTempos[i] !== undefined ? recordedTempos[i] : '<span class="unmeasured">未計測</span>';
            tempoTableBody.innerHTML += `<tr><td>${label}</td><td>${time}</td></tr>`;
        }
    }

    // --- CSVエクスポート ---
    document.getElementById('btn-export').addEventListener('click', () => {
        let csvContent = "データ種別,分析区間,タイム(秒)\n";
        
        for (let i = 0; i < recordedSplits.length; i++) {
            const label = targetSplits[i] || `追加区間${i + 1}`;
            csvContent += `Split,${label},${recordedSplits[i]}\n`;
        }
        
        for (let i = 0; i < recordedTempos.length; i++) {
            const label = targetTempos[i] || `追加計測${i + 1}`;
            csvContent += `Tempo,${label},${recordedTempos[i]}\n`;
        }

        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "race_analysis.csv";
        link.click();
    });

    // ==========================================
    // --- キャリブレーション (描画) 機能 ---
    // ==========================================
    const canvas = document.getElementById('draw-canvas');
    const ctx = canvas.getContext('2d');
    const btnDrawToggle = document.getElementById('btn-draw-toggle');
    const btnClearLines = document.getElementById('btn-clear-lines');

    let isDrawMode = false;
    let isDrawing = false;
    let lines = [];
    let currentLine = null;

    function resizeCanvas() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        redrawCanvas();
    }
    video.addEventListener('loadedmetadata', resizeCanvas);
    window.addEventListener('resize', resizeCanvas);

    btnDrawToggle.addEventListener('click', () => {
        isDrawMode = !isDrawMode;
        if (isDrawMode) {
            btnDrawToggle.textContent = '描画モード：ON';
            btnDrawToggle.classList.add('active');
            canvas.classList.add('drawing-active');
        } else {
            btnDrawToggle.textContent = '描画モード：OFF';
            btnDrawToggle.classList.remove('active');
            canvas.classList.remove('drawing-active');
        }
    });

    btnClearLines.addEventListener('click', () => {
        lines = [];
        redrawCanvas();
    });

    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function redrawCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#eab308';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';

        lines.forEach(line => {
            ctx.beginPath();
            ctx.moveTo(line.startX, line.startY);
            ctx.lineTo(line.endX, line.endY);
            ctx.stroke();
        });

        if (currentLine) {
            ctx.beginPath();
            ctx.moveTo(currentLine.startX, currentLine.startY);
            ctx.lineTo(currentLine.endX, currentLine.endY);
            ctx.stroke();
        }
    }

    canvas.addEventListener('mousedown', (e) => {
        if (!isDrawMode) return;
        isDrawing = true;
        const pos = getMousePos(e);
        currentLine = { startX: pos.x, startY: pos.y, endX: pos.x, endY: pos.y };
    });

    canvas.addEventListener('mousemove', (e) => {
        if (!isDrawing) return;
        const pos = getMousePos(e);
        currentLine.endX = pos.x;
        currentLine.endY = pos.y;
        redrawCanvas();
    });

    canvas.addEventListener('mouseup', () => {
        if (!isDrawing) return;
        isDrawing = false;
        if (currentLine) {
            if (currentLine.startX !== currentLine.endX || currentLine.startY !== currentLine.endY) {
                lines.push(currentLine);
            }
            currentLine = null;
        }
        redrawCanvas();
    });

    canvas.addEventListener('mouseleave', () => {
        if (isDrawing) {
            isDrawing = false;
            currentLine = null;
            redrawCanvas();
        }
    });

</script>

</body>
</html>
